name: Déploiement Production

on:
  push:
    branches: [ "production" ]

permissions:
  contents: read

jobs:
  tests:
    name: Tests PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'

      - uses: actions/checkout@v4

      - name: Cache Composer
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-php-

      - name: Installer les dépendances
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Créer la base SQLite pour les tests
        run: |
          mkdir -p data
          touch data/database.sqlite

      - name: Exécuter les tests
        env:
          DATABASE_URL: sqlite:///%kernel.project_dir%/data/database.sqlite
        run: vendor/bin/phpunit

  deploy:
    name: Déploiement sur production.cf2m.be
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Déploiement SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_VPS_HOST }}
          username: ${{ secrets.PROD_VPS_USER }}
          key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          script: |
            set -e
            export PATH="/var/www/vhosts/cf2m.be/.phpenv/shims:/var/www/vhosts/cf2m.be/.phpenv/bin:$PATH"
            cd /var/www/vhosts/cf2m.be/production.cf2m.be/pre2026.cf2m.be
            git remote set-url origin https://github.com/mikhawa/pre2026.cf2m.be

            echo "=== Git pull ==="
            git pull origin production

            echo "=== Composer install ==="
            composer install --no-dev --optimize-autoloader --no-interaction

            echo "=== Migrations ==="
            php bin/console doctrine:migrations:migrate --no-interaction --env=prod

            echo "=== Cache ==="
            php bin/console cache:clear --env=prod
            php bin/console cache:warmup --env=prod

            echo "=== Permissions ==="
            find public/uploads var/ -user "$(whoami)" -type d -exec chmod 775 {} \;
            find public/uploads var/ -user "$(whoami)" -type f -exec chmod 664 {} \;

            echo "=== Assets ==="
            php bin/console importmap:install
            php bin/console asset-map:compile --env=prod


            echo "=== Déploiement terminé ==="
