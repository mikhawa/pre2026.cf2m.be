#
# TODO (mise en production) :
# - Adapter les branches déclenchant le workflow (push/pull_request) selon la stratégie de déploiement
# - Remplacer la base de données SQLite par la vraie base de production (MySQL, PostgreSQL, etc.)
# - Configurer les secrets GitHub (DATABASE_URL, APP_SECRET, etc.) via Settings > Secrets and variables
# - Ajouter une étape de déploiement (ex: SSH, rsync, FTP, Deployer, Docker, etc.)
# - Envisager de séparer le workflow de tests du workflow de déploiement
# - Vérifier que la version de PHP correspond à celle du serveur de production

name: Symfony

on:
  push:
    branches: [ "baseGithubWorkflow" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  symfony-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
    - uses: actions/checkout@v4
    - name: Copy .env.test.local
      run: php -r "file_exists('.env.test.local') || copy('.env.test', '.env.test.local');"
    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
    - name: Create Database
      run: |
        mkdir -p data
        touch data/database.sqlite
    - name: Execute tests (Unit and Feature tests) via PHPUnit
      env:
        DATABASE_URL: sqlite:///%kernel.project_dir%/data/database.sqlite
      run: vendor/bin/phpunit
